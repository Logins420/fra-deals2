<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FRA Deals ✈</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--card:#111;--border:#1e1e1e;--text:#f0ece4;--muted:#555;--green:#4ade80;--orange:#f97316;--red:#ff4d4d;--purple:#a78bfa}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#222}

.ticker{background:var(–red);padding:7px 20px;display:flex;gap:24px;overflow:hidden;white-space:nowrap;align-items:center}
.ticker-label{font-size:10px;font-weight:700;letter-spacing:2px;color:#fff;flex-shrink:0}
.ticker-item{font-size:11px;color:#fff}
.ticker-item strong{font-weight:600}

header{position:sticky;top:0;z-index:99;background:var(–bg);border-bottom:1px solid var(–border)}
.header-inner{display:flex;justify-content:space-between;align-items:center;padding:13px 20px}
.logo{font-family:‘Fraunces’,serif;font-size:20px;font-weight:700;letter-spacing:-.5px}
.logo small{font-size:10px;color:var(–muted);letter-spacing:3px;font-family:‘IBM Plex Mono’,monospace;font-weight:400;margin-left:10px}

/* SEARCH BAR */
.search-wrap{padding:16px 20px;border-bottom:1px solid var(–border);background:#0d0d0d}
.search-box{display:flex;gap:8px;max-width:600px;margin:0 auto}
.search-input{flex:1;background:#161616;border:1px solid #2a2a2a;border-radius:10px;color:var(–text);padding:12px 16px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(–purple)}
.search-input::placeholder{color:#444}
.search-btn{background:var(–purple);border:none;border-radius:10px;color:#0a0a0a;padding:12px 20px;font-size:12px;font-family:‘Fraunces’,serif;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.search-btn:hover{opacity:.85}
.search-btn:disabled{opacity:.5;cursor:not-allowed}
.search-result{max-width:600px;margin:12px auto 0;background:#111;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden;display:none}
.search-result.visible{display:block}
.search-error{color:var(–red);font-size:12px;margin-top:8px;max-width:600px;margin-left:auto;margin-right:auto}

.layout{display:grid;grid-template-columns:190px 1fr;gap:24px;max-width:1120px;margin:0 auto;padding:24px 20px}

aside{position:sticky;top:130px;height:fit-content}
.filter-label{font-size:10px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.filter-section{margin-bottom:20px}
.pill{display:block;width:100%;text-align:left;background:transparent;border:none;border-radius:6px;color:var(–muted);padding:7px 10px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:2px}
.pill:hover{color:var(–text)}
.pill.active{background:var(–text);color:var(–bg)}
.pill.soft{background:#1a1a1a;border:1px solid #2a2a2a;color:var(–text)}
.stat-box{background:var(–card);border:1px solid var(–border);border-radius:10px;padding:14px;margin-top:20px}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.toolbar-info{font-size:11px;color:var(–muted)}
.sort-row{display:flex;gap:6px}
.sort-btn{background:transparent;border:1px solid transparent;border-radius:6px;color:var(–muted);padding:5px 9px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.sort-btn.active{border-color:#2a2a2a;color:var(–purple)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}

.card{background:var(–card);border:1px solid var(–border);border-radius:14px;overflow:hidden;transition:transform .2s,border-color .2s}
.card:hover{transform:translateY(-3px);border-color:#2a2a2a}
.card-top{background:#161616;padding:12px 15px;display:flex;justify-content:space-between;align-items:flex-start}
.city{font-family:‘Fraunces’,serif;font-size:16px;font-weight:700}
.city-sub{font-size:10px;color:var(–muted);margin-top:1px}
.heat{font-size:10px;font-weight:700;letter-spacing:1px}
.old{font-size:11px;color:#333;text-decoration:line-through;margin-top:2px}
.price-row{padding:13px 15px 8px;display:flex;justify-content:space-between;align-items:flex-end}
.price{font-family:‘Fraunces’,serif;font-size:34px;font-weight:700;line-height:1}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:7px}
.tags{padding:0 15px 10px;display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:3px 8px;border-radius:5px;background:#1a1a1a;color:#666}
.tag.warn{color:var(–orange);background:#f9731618}
.tag.go{color:var(–green);background:#4ade8018}
.actions{padding:0 15px 13px;display:flex;gap:7px}
.btn-ai{flex:1;background:transparent;border:1px solid #252525;border-radius:8px;color:var(–muted);padding:8px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-ai:hover,.btn-ai.scored{border-color:var(–purple);color:var(–purple)}
.btn-book{flex:2;background:var(–text);border:none;border-radius:8px;color:var(–bg);padding:8px;font-size:12px;cursor:pointer;font-family:‘Fraunces’,serif;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.btn-book:hover{opacity:.85}
.ai-panel{border-top:1px solid #1a1a1a;padding:12px 15px;background:#0d0d0d;display:none}
.ai-panel.open{display:block}
.ai-inner{display:flex;gap:12px;align-items:center}
.ai-verdict{font-size:12px;color:#aaa;line-height:1.6}
.ai-lbl{font-size:9px;color:var(–muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px;gap:14px;color:var(–muted)}
.spinner{width:24px;height:24px;border:2px solid #1e1e1e;border-top-color:var(–green);border-radius:50%;animation:spin .7s linear infinite}
.empty{text-align:center;padding:60px;color:#333;font-family:‘Fraunces’,serif;font-size:18px;font-style:italic}
.err{background:#1a0808;border:1px solid #3a1010;border-radius:10px;padding:18px;color:#ff8080;font-size:12px;line-height:1.7;margin:20px 0}

.live-dot{display:flex;gap:5px;align-items:center;font-size:11px;color:var(–green)}
.dot{width:6px;height:6px;border-radius:50%;background:var(–green);animation:blink 2s infinite}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tickFade{0%{opacity:0;transform:translateY(5px)}15%,85%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-5px)}}
.fade-up{animation:fadeUp .35s ease both}

input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:#222;border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(–text);cursor:pointer}

@media(max-width:650px){
.layout{grid-template-columns:1fr}
aside{position:static}
.filter-section{display:flex;flex-wrap:wrap;gap:4px}
.filter-section .filter-label{width:100%}
.pill{width:auto;display:inline-block}
}
</style>

</head>

  </aside>

  <!-- MAIN -->

  <main>
    <div class="toolbar">

      </div>

<footer style="border-top:1px solid var(--border);padding:14px;text-align:center">

<script>
let allDeals = [];
let region   = "All";
let stops    = "all";
let maxPrice = 2000;
let sortBy   = "savings";
let aiCache  = {};
let tickIdx  = 0;

// ── FETCH DEALS ────────────────────────────────────────────────────
async function loadDeals() {
  try {
    const res  = await fetch("/api/deals");
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    allDeals = data.deals;
    startTicker();
    document.getElementById("update-time").textContent =
      "Updated " + new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
    render();
  } catch(e) {
    document.getElementById("content").innerHTML =
      `<div class="err">⚠️ <strong>Could not load deals.</strong><br><br>
      Make sure <code>TRAVELPAYOUTS_TOKEN</code> is set in Railway Variables.<br>Error: ${e.message}</div>`;
  }
}

// ── SEARCH ────────────────────────────────────────────────────────
async function doSearch() {
  const q   = document.getElementById("search-input").value.trim();
  const btn = document.getElementById("search-btn");
  const err = document.getElementById("search-error");
  const box = document.getElementById("search-result");
  if (!q) return;
  btn.disabled = true;
  btn.textContent = "Searching…";
  err.textContent = "";
  box.classList.remove("visible");
  box.innerHTML = "";
  try {
    const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (!data.ok) { err.textContent = "❌ " + data.error; return; }
    const d = data.deal;
    box.innerHTML = miniCard(d);
    box.classList.add("visible");
  } catch(e) {
    err.textContent = "❌ Search failed: " + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "Search";
  }
}

function miniCard(d) {
  const bookUrl = d.bookingUrl || `https://www.aviasales.com/search/FRA${d.to}1`;
  return `<div style="padding:16px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
    <div style="display:flex;gap:10px;align-items:center">
      <span style="font-size:22px">${d.flag||"🔍"}</span>
      <div>
        <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:700">${d.city} <span style="color:var(--muted);font-size:13px">(${d.to})</span></div>
        <div style="font-size:11px;color:var(--muted)">${d.airline||""} · ${d.stops===0?"✈ Nonstop":"1 stop"}${d.departDate&&d.departDate!=="N/A"?" · "+d.departDate:""}</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:var(--green)">€${d.price}</div>
      <a href="${bookUrl}" target="_blank" style="background:var(--text);color:#0a0a0a;border-radius:8px;padding:8px 14px;font-family:'Fraunces',serif;font-weight:700;font-size:12px;text-decoration:none">Book →</a>
    </div>
  </div>`;
}

// ── TICKER ────────────────────────────────────────────────────────
function startTicker() {
  if (!allDeals.length) return;
  const top = [...allDeals].sort((a,b)=>a.price-b.price).slice(0,6);
  function show() {
    const d = top[tickIdx % top.length];
    document.getElementById("ticker-text").innerHTML =
      `${d.flag} <strong>${d.city}</strong> from €${d.price} · ${d.airline} · ${d.stops===0?"Nonstop":"1 stop"}`;
    tickIdx++;
  }
  show();
  setInterval(show, 4000);
}

// ── FILTERS ───────────────────────────────────────────────────────
function setRegion(r, btn) {
  region = r;
  document.querySelectorAll("aside .pill").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}
function setStops(s) {
  stops = s;
  document.getElementById("stops-all").className     = "pill" + (s==="all"?"     soft":"");
  document.getElementById("stops-nonstop").className = "pill" + (s==="nonstop"?" soft":"");
  render();
}
function setMax(v) {
  maxPrice = +v;
  document.getElementById("price-lbl").textContent = v>=2000 ? "Any" : "€"+v;
  render();
}
function setSort(s) {
  sortBy = s;
  document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

// ── FILTER + SORT ─────────────────────────────────────────────────
function filtered() {
  return allDeals
    .filter(d=>region==="All"||d.region===region)
    .filter(d=>stops==="all"||d.stops===0)
    .filter(d=>d.price<=maxPrice)
    .sort((a,b)=>{
      if(sortBy==="savings") return (b.normalPrice||b.price*1.5)-b.price - ((a.normalPrice||a.price*1.5)-a.price);
      if(sortBy==="price")   return a.price-b.price;
      return 0;
    });
}

// ── SCORE RING ────────────────────────────────────────────────────
function ring(score,color){
  const r=19,c=2*Math.PI*r,d=(score/100)*c;
  return `<svg width="48" height="48" style="transform:rotate(-90deg);flex-shrink:0">
    <circle cx="24" cy="24" r="${r}" fill="none" stroke="#222" stroke-width="3"/>
    <circle cx="24" cy="24" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${d} ${c}" stroke-linecap="round"
      style="transition:stroke-dasharray 1s cubic-bezier(.34,1.56,.64,1)"/>
    <text x="24" y="24" text-anchor="middle" dominant-baseline="central"
      style="font-size:11px;font-weight:700;fill:#f0ece4;transform:rotate(90deg);transform-origin:24px 24px;font-family:inherit">${score}</text>
  </svg>`;
}

// ── AI SCORE ──────────────────────────────────────────────────────
async function scoreCard(id) {
  const deal = allDeals.find(d=>d.to===id);
  if (!deal) return;
  const panel = document.getElementById("ai-"+id);
  const btn   = document.getElementById("btn-"+id);
  if (aiCache[id]) {
    panel.classList.toggle("open");
    return;
  }
  panel.classList.add("open");
  panel.innerHTML = `<div style="display:flex;gap:10px;align-items:center">
    <div class="spinner" style="width:14px;height:14px;border-width:1.5px;border-top-color:var(--purple)"></div>
    <span style="font-size:11px;color:var(--muted)">Scoring with AI…</span></div>`;
  try {
    const prompt = `Rate this Frankfurt flight deal 0-100. Be concise.
${deal.city} (${deal.to}): €${deal.price} · ${deal.airline} · ${deal.stops===0?"Nonstop":"1 stop"}
Return ONLY valid JSON no markdown: {"score":<number>,"verdict":"<max 10 words>","emoji":"<emoji>"}`;
    const res  = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:120,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const ai   = JSON.parse(data.content?.[0]?.text.replace(/```json|```/g,"").trim()||"{}");
    aiCache[id] = ai;
    const col  = ai.score>=80?"#4ade80":ai.score>=60?"#f97316":"#ff4d4d";
    panel.innerHTML = `<div class="ai-inner">${ring(ai.score,col)}
      <div><div class="ai-lbl">AI Deal Score</div>
      <div class="ai-verdict">${ai.emoji} ${ai.verdict}</div></div></div>`;
    btn.className="btn-ai scored";
    btn.textContent=`Score: ${ai.score}/100`;
  } catch {
    panel.innerHTML=`<div style="font-size:11px;color:#555">Could not load score.</div>`;
  }
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const deals = filtered();
  const best  = deals.length ? Math.max(...deals.map(d=>(d.normalPrice||d.price*1.5)-d.price)) : 0;
  document.getElementById("result-count").textContent = `${deals.length} deal${deals.length!==1?"s":""} · ${sortBy}`;
  document.getElementById("stat-save").textContent    = `€${Math.round(best)}`;
  document.getElementById("stat-count").textContent   = `${deals.length} deals · FRA`;

  if (!deals.length) {
    document.getElementById("content").innerHTML = `<div class="empty">No deals match your filters</div>`;
    return;
  }
  document.getElementById("content").innerHTML =
    `<div class="grid">${deals.map((d,i)=>cardHTML(d,i)).join("")}</div>`;
}

function cardHTML(d,i) {
  const normal  = d.normalPrice || Math.round(d.price*1.45);
  const saving  = normal - d.price;
  const pct     = Math.round((saving/normal)*100);
  const isHot   = pct>=50;
  const isGreat = pct>=33&&!isHot;
  const heatLbl = isHot?"🔥 HOT":isGreat?"⚡ GREAT":"✅ GOOD";
  const heatCol = isHot?"#ff4d4d":isGreat?"#f97316":"#4ade80";
  const ai      = aiCache[d.to];
  const bookUrl = d.bookingUrl||`https://www.aviasales.com/search/FRA${d.to}1`;

  return `<div class="card fade-up" style="animation-delay:${i*.04}s">
    <div class="card-top">
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:20px">${d.flag}</span>
        <div><div class="city">${d.city}</div>
        <div class="city-sub">${d.to} · ${d.region}</div></div>
      </div>
      <div style="text-align:right">
        <div class="heat" style="color:${heatCol}">${heatLbl}</div>
        <div class="old">€${normal}</div>
      </div>
    </div>
    <div class="price-row">
      <div>
        <div style="display:flex;align-items:baseline">
          <span class="price">€${d.price}</span>
          <span class="badge" style="background:${heatCol}22;color:${heatCol}">-${pct}%</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">Save €${saving} p.p.</div>
      </div>
      <div style="text-align:right;font-size:11px">
        <div style="color:#888">${d.airline}</div>
        <div style="color:${d.stops===0?"var(--green)":"#666"}">${d.stops===0?"✈ Nonstop":"1 stop"}</div>
      </div>
    </div>
    <div class="tags">
      ${d.departDate&&d.departDate!=="N/A"?`<span class="tag">📅 ${d.departDate}</span>`:""}
      ${d.stops===0?'<span class="tag go">Direct</span>':""}
    </div>
    <div class="ai-panel ${ai?"open":""}" id="ai-${d.to}">
      ${ai?`<div class="ai-inner">${ring(ai.score,ai.score>=80?"#4ade80":ai.score>=60?"#f97316":"#ff4d4d")}
        <div><div class="ai-lbl">AI Deal Score</div>
        <div class="ai-verdict">${ai.emoji} ${ai.verdict}</div></div></div>`:""}
    </div>
    <div class="actions">
      <button class="btn-ai ${ai?"scored":""}" id="btn-${d.to}" onclick="scoreCard('${d.to}')">
        ${ai?`Score: ${ai.score}/100`:"⚡ AI Score"}
      </button>
      <a class="btn-book" href="${bookUrl}" target="_blank" rel="noopener">Book Deal →</a>
    </div>
  </div>`;
}

loadDeals();
setInterval(loadDeals, 15*60*1000);
</script>

</body>
</html>
